{% extends 'core/base.html' %}

{% block title %}Delanteros{% endblock %}
{% block content %}
    <h1>Jugadores Delanteros</h1>
    <ul>
        {% for jugador in jugadores %}
            <li>{{ jugador.nombre }}</li>
        {% empty %}
            <li>No hay jugadores delanteros registrados.</li>
        {% endfor %}
    </ul>
{% endblock %}
