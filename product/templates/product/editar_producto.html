{% load l10n %}
<h1>Editar Producto</h1>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1>Editar Producto</h1>
            <form method="POST">
                {% csrf_token %}
                <div class="form-group mb-3">
                    <label for="nombre">Nombre:</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" value="{{ producto.nombre }}" required>
                </div>
                {% localize off %}
                <div class="form-group mb-3">
                    <label for="precio">Precio: </label>
                    <input type="number" class="form-control" id="precio" name="precio" step="0.01" value="{{ producto.precio}}" required>
                </div>
                {% endlocalize %}
                
                <div class="form-group mb-3">
                    <label for="categoria">Categoría:</label>
                    <select class="form-control" id="categoria" name="categoria" required>
                        {% for categoria in categorias %}
                            <option value="{{ categoria.id }}" {% if categoria.id == producto.categoria.id %}selected{% endif %}>{{ categoria.nombre }}</option>
                        {% endfor %}
                    </select>
                
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                <a href="{% url 'product:lista_de_productos' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
