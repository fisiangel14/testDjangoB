<h1>Lista de Laptops</h1>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<ul>
    {% for producto in productos %}
        <li>
            <a href="{% url 'product:detalle_producto' producto.id %}">
                {{ producto.nombre }} - S/ {{ producto.precio }} - {{ producto.categoria.nombre }}
            </a>
        </li>
    {% endfor %}
</ul>
